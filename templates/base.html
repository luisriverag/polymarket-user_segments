<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Polymarket User Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --link: #2563eb;
      --tag-bg: #eef2ff;
      --tag-border: #c7d2fe;
      --tag-good-bg: #ecfdf5;
      --tag-good-border: #86efac;
      --tag-bad-bg: #fef2f2;
      --tag-bad-border: #fca5a5;
    }

    * { box-sizing: border-box; }

    body {
      font-family: Inter, Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1450px;
      margin: 0 auto;
      padding: 24px;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .nav {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      padding: 14px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .tag-panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .tag-panel {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: #fafbfc;
    }

    .tag-panel-title {
      font-weight: 700;
      margin-bottom: 10px;
    }

    .tag-chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .toolbar,
    .pagination-row,
    .button-row,
    .tag-mode-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tag-mode-row {
      justify-content: flex-start;
      margin-top: 8px;
      margin-bottom: 8px;
    }

    .muted {
      color: var(--muted);
      font-size: 0.95em;
    }

    .stat {
      font-size: 1.8rem;
      font-weight: 700;
      margin-top: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid #eef2f7;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
      position: sticky;
      top: 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      border-radius: 999px;
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      font-size: 12px;
      white-space: nowrap;
    }

    .tag-good {
      background: var(--tag-good-bg);
      border-color: var(--tag-good-border);
    }

    .tag-danger {
      background: var(--tag-bad-bg);
      border-color: var(--tag-bad-border);
    }

    .choice-tag {
      cursor: pointer;
      user-select: none;
      padding: 6px 10px;
    }

    .choice-tag input {
      display: none;
    }

    .choice-tag.selected,
    .choice-tag:has(input:checked) {
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
      transform: translateY(-1px);
    }

    .include-tag.selected,
    .include-tag:has(input:checked) {
      background: var(--tag-good-bg);
      border-color: var(--tag-good-border);
    }

    .exclude-tag.selected,
    .exclude-tag:has(input:checked) {
      background: var(--tag-bad-bg);
      border-color: var(--tag-bad-border);
    }

    .tag-meta,
    .tag-score {
      color: var(--muted);
      font-size: 11px;
    }

    input[type="text"], select {
      padding: 9px 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: white;
    }

    button {
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: white;
      cursor: pointer;
    }

    button:hover {
      background: #f9fafb;
    }

    pre {
      white-space: pre-wrap;
      background: #f8fafc;
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 10px;
    }

    h1, h2 {
      margin-top: 0;
    }

    @media (max-width: 900px) {
      .tag-panels {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="/">Dashboard</a>
      <a href="/tags">Tags</a>
    </div>

    {% block content %}{% endblock %}
  </div>
</body>
</html>
